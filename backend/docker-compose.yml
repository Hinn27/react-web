version: "3.8"

services:
    db:
        image: postgres:15
        environment:
            POSTGRES_DB: refood
            POSTGRES_USER: hinne
            POSTGRES_PASSWORD: ""
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    web:
        build: .
        command: python manage.py runserver 0.0.0.0:8000
        volumes:
            - .:/app
        ports:
            - "8000:8000"
        depends_on:
            - db
        environment:
            - DJANGO_SETTINGS_MODULE=refood.settings

volumes:
    postgres_data:
